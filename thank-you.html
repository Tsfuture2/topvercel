<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | TopVercel</title>
    <link rel="icon" type="image/png" href="/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', '"Noto Serif JP"', 'serif'],
                        sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        'brand-black': '#0a0a0a',
                        'brand-gray': '#1f1f1f',
                        'brand-light': '#f4f4f5',
                        'brand-accent': '#d4af37',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(212, 175, 55, 0.12), transparent 28%),
                radial-gradient(circle at bottom right, rgba(244, 244, 245, 0.08), transparent 30%),
                #0a0a0a;
            color: #f4f4f5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background: #f4f4f5;
            color: #0a0a0a;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 220px;
            padding: 1rem 2rem;
            border: 1px solid #f4f4f5;
            background: #f4f4f5;
            color: #0a0a0a;
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .cta-button:hover {
            background: #d4d4d8;
            border-color: #d4d4d8;
        }

        .thank-you-panel {
            border: 1px solid rgba(39, 39, 42, 0.95);
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(18px);
        }

        .frame-line {
            position: absolute;
            inset: 1.5rem;
            border: 1px solid rgba(244, 244, 245, 0.08);
            pointer-events: none;
        }
    </style>
</head>
<body class="font-sans antialiased text-brand-light min-h-screen">
    <div class="frame-line"></div>

    <nav class="fixed top-0 w-full p-6 md:p-12 z-20 flex justify-between items-center">
        <a href="/" class="font-serif text-2xl tracking-widest font-semibold uppercase">TopVercel</a>
    </nav>

    <main class="min-h-screen flex items-center justify-center px-6 md:px-12 py-32">
        <section class="thank-you-panel w-full max-w-4xl mx-auto px-8 py-14 md:px-16 md:py-20 text-center relative overflow-hidden">
            <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/25 to-transparent"></div>
            <p class="font-sans text-xs tracking-[0.3em] uppercase text-gray-500 mb-6">Inquiry Received</p>
            <h1 class="font-serif text-5xl md:text-8xl leading-none font-light">Thank You.</h1>
            <h2 class="font-serif text-2xl md:text-4xl mt-8 text-gray-200">お問い合わせありがとうございます。</h2>
            <p class="font-sans text-base md:text-lg leading-loose text-gray-400 max-w-2xl mx-auto mt-8">
                内容を確認のうえ、通常1営業日以内にご連絡します。
            </p>

            <div class="w-16 h-px bg-white/20 mx-auto my-10"></div>

            <a href="/" class="cta-button">トップへ戻る</a>
        </section>
    </main>
</body>
</html>
